# HomeTax fact catalog.
#
# 액션 ID, 화면 ID, 서브시스템 호스트 같이 홈택스가 바꿀 수 있는 식별자들을
# 데이터로 분리한다. 라이브러리 코드 변경 없이 toml 한 줄 수정으로 정정할 수
# 있게 하기 위함.
#
# 검증 시점: 2026-04 ~ 2026-05.
# 갱신 시 docs/hometax-facts.md 의 해당 항목과 cross-check.

