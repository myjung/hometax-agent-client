<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>hometax-agent-client web sample</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont,
         "Apple SD Gothic Neo", sans-serif;
         max-width: 760px; margin: 2rem auto; padding: 0 1rem;
         color: #222; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .sub { color: #888; font-size: 0.9rem; }
  fieldset { border: 1px solid #ccc; border-radius: 6px;
             padding: 0.8rem 1rem 1rem; margin: 1rem 0; }
  legend { font-size: 0.9rem; color: #444; padding: 0 0.4rem; }
  label { display: block; margin: 0.4rem 0 0.2rem;
          font-size: 0.9rem; color: #555; }
  input[type=number] { width: 8rem; padding: 0.4rem;
                       font-size: 1rem; }
  button { padding: 0.5rem 1rem; font-size: 1rem;
           background: #2860c4; color: white;
           border: 0; border-radius: 4px; cursor: pointer; }
  button:disabled { background: #888; cursor: not-allowed; }
  pre { background: #f7f7f9; padding: 0.8rem; border-radius: 4px;
        overflow-x: auto; font-size: 0.85rem; line-height: 1.4; }
  .status { padding: 0.6rem; border-radius: 4px; margin: 0.6rem 0; }
  .status.ok { background: #e8f5e9; color: #1b5e20; }
  .status.error { background: #ffebee; color: #b71c1c; }
  .env-flag { display: inline-block; padding: 2px 8px; margin-right: 4px;
              border-radius: 3px; font-size: 0.8rem; }
  .env-flag.on { background: #e0f2e9; color: #1e7e34; }
  .env-flag.off { background: #fceaea; color: #888; }
  .preview-banner { background: #fff8e1; color: #6d4c00;
                    padding: 0.5rem 0.8rem; border-radius: 4px;
                    margin: 1rem 0; font-size: 0.85rem;
                    border: 1px solid #ffe082; display: none; }
  .preview-banner.show { display: block; }
</style>
</head>
<body>

<h1>hometax-agent-client — 단순 조회 예제</h1>
<p class="sub">단건 조회 데모. 운영용 UI 가 아니라 라이브러리 사용 방법을
보여주는 예시입니다.</p>

<div id="previewBanner" class="preview-banner">
  ⓘ Preview 모드입니다 — 실제 홈택스 호출 없이 mock 데이터로 응답합니다.
  실제 동작은 <code>server.py</code> 를 띄우고 환경변수를 설정하세요.
</div>

<fieldset>
  <legend>환경 상태</legend>
  <div id="env">로딩 중…</div>
</fieldset>

<form id="form">
<fieldset>
  <legend>조회 입력</legend>
  <label for="year">귀속연도</label>
  <input id="year" name="year" type="number" min="2010" max="2030" required>
  <div style="margin-top: 0.8rem;">
    <button id="submit" type="submit">조회 실행</button>
  </div>
</fieldset>
</form>

<div id="result"></div>

<script>
function flag(label, on) {
  const cls = on ? 'env-flag on' : 'env-flag off';
  return `<span class="${cls}">${label}: ${on ? 'O' : 'X'}</span>`;
}

async function loadStatus() {
  const r = await fetch('/api/health');
  const j = await r.json();
  const env = j.env;
  document.getElementById('year').value = env.default_year;
  const html = [
    flag('cookies', env.has_cookies),
    flag('user_id', env.has_user_id),
    flag('password', env.has_password),
    flag('rrn', env.has_rrn),
  ].join(' ');
  document.getElementById('env').innerHTML = html;
  if (j.preview) {
    document.getElementById('previewBanner').classList.add('show');
  }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const button = document.getElementById('submit');
  button.disabled = true;
  document.getElementById('result').innerHTML =
    '<div class="status">조회 중… (네트워크/홈택스 응답 시간에 따라 수 초 ~ 수십 초)</div>';
  try {
    const year = parseInt(document.getElementById('year').value, 10);
    const r = await fetch('/api/lookup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({year}),
    });
    const j = await r.json();
    if (!r.ok) {
      const t = j.error_type || 'Error';
      document.getElementById('result').innerHTML =
        `<div class="status error"><b>${t}</b>: ${j.message || ''}</div>`;
      return;
    }
    const head = `<div class="status ok">완료. ${j.elapsed_sec}s, `
      + `사용자=${j.user_name || '-'}, tin=${j.tin || '-'}</div>`;
    const body = `<pre>${JSON.stringify(j.inquiries, null, 2)}</pre>`;
    document.getElementById('result').innerHTML = head + body;
  } catch (exc) {
    document.getElementById('result').innerHTML =
      `<div class="status error">요청 실패: ${exc.message || exc}</div>`;
  } finally {
    button.disabled = false;
  }
});

loadStatus();
</script>
</body>
</html>
